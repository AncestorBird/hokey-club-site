<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部員ブログ | 富山大学アイスホッケー部</title>
    <meta name="description" content="富山大学アイスホッケー部 部員ブログ。練習の様子、試合レポート、日々の出来事をお届けします。">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header scrolled" id="top">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span class="logo-en">TOYAMA UNIV.</span>
                <span class="logo-ja">アイスホッケー部</span>
            </a>
            <nav class="global-nav" id="globalNav">
                <ul>
                    <li><a href="index.html">TOP</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#activity">Activity</a></li>
                    <li><a href="index.html#news">News</a></li>
                    <li><a href="blog.html" class="is-current">Blog</a></li>
                    <li><a href="index.html#recruit">Recruit</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="メニューを開く">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="blog-main">

        <!-- ===== BLOG HEADER ===== -->
        <section class="blog-hero">
            <div class="section-inner">
                <p class="section-label">BLOG</p>
                <h1 class="blog-hero-title">部員ブログ</h1>
                <p class="blog-hero-desc">部員ひとりひとりの視点から、練習・試合・日常をお届けします。</p>
            </div>
        </section>

        <!-- ===== POSTS ===== -->
        <section class="section section-white">
            <div class="section-inner blog-inner">
                <div id="blog-list" class="blog-list">
                    <p class="blog-loading">記事を読み込み中…</p>
                </div>
            </div>
        </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-logo">
                <span class="logo-en">TOYAMA UNIV.</span>
                <span class="logo-ja">アイスホッケー部</span>
            </div>
            <nav class="footer-nav">
                <a href="index.html">TOP</a>
                <a href="index.html#about">About</a>
                <a href="index.html#activity">Activity</a>
                <a href="index.html#news">News</a>
                <a href="blog.html">Blog</a>
                <a href="index.html#recruit">Recruit</a>
                <a href="index.html#contact">Contact</a>
            </nav>
            <p class="footer-copy">&copy; 2026 富山大学アイスホッケー部</p>
        </div>
    </footer>

    <script>
        // Hamburger menu
        const hamburger = document.getElementById('hamburger');
        const nav = document.getElementById('globalNav');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            nav.classList.toggle('open');
        });
        nav.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('open');
                nav.classList.remove('open');
            });
        });

        // Render posts
        const formatDate = (iso) => {
            const d = new Date(iso);
            if (isNaN(d)) return iso;
            return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
        };

        fetch('posts.json', { cache: 'no-cache' })
            .then(res => {
                if (!res.ok) throw new Error('posts.json の読み込みに失敗しました');
                return res.json();
            })
            .then(data => {
                const list = document.getElementById('blog-list');
                const posts = (data.posts || [])
                    .slice()
                    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

                if (posts.length === 0) {
                    list.innerHTML = '<p class="blog-loading">まだ記事がありません。</p>';
                    return;
                }

                list.innerHTML = posts.map(post => `
                    <article class="blog-post" id="${post.id}">
                        <header class="blog-post-head">
                            <time class="blog-post-date">${formatDate(post.date)}</time>
                            <span class="blog-post-author">by ${post.author}</span>
                        </header>
                        <h2 class="blog-post-title">${post.title}</h2>
                        <div class="blog-post-body">${post.body}</div>
                    </article>
                `).join('');
            })
            .catch(err => {
                document.getElementById('blog-list').innerHTML =
                    `<p class="blog-loading">記事を読み込めませんでした。${err.message}</p>`;
            });
    </script>
</body>
</html>
